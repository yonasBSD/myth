<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myth Engine — Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body data-page="gallery">
    <!-- Full-bleed canvas: iframe occupies 100% viewport -->
    <iframe id="viewer-frame" class="viewer-frame" title="Myth Gallery Viewer" src="about:blank"></iframe>

    <div id="action-bar" class="action-bar hidden">
        <a id="btn-standalone" href="#" target="_blank" class="action-btn" aria-label="Open in standalone page" title="Open in standalone page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </a>
        <a id="btn-source" href="#" target="_blank" class="action-btn" aria-label="View source code" title="View source code">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
    </div>

    <aside id="hint-panel" class="hint-panel hidden" role="status" aria-live="polite" aria-label="Controls panel">
        <div class="hint-panel-label">CONTROLS</div>
        <div id="hint-lines" class="hint-panel-lines"></div>
    </aside>

    <!-- Sidebar toggle (visible when sidebar is closed) -->
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Open navigation">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 1h16M0 6h10M0 11h16" stroke="currentColor" stroke-width="1.4"/>
        </svg>
    </button>

    <!-- Scrim overlay for mobile sidebar -->
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

    <!-- Floating glassmorphism sidebar -->
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <a class="brand-link" href="https://github.com/panxinmiao/myth" target="_blank" rel="noreferrer" aria-label="Open Myth Engine GitHub repository">
                <div class="logo">MYTH<span class="logo-accent">ENGINE</span></div>
                <div class="version">v0.3.0</div>
            </a>
            <button class="sidebar-close" id="sidebar-close" type="button" aria-label="Close navigation">&times;</button>
        </header>

        <div class="sidebar-divider"></div>

        <nav id="nav-menu" class="nav-menu" aria-label="Gallery navigation"></nav>

        <div class="sidebar-divider"></div>

        <footer class="sidebar-footer">
            <a class="footer-link" href="https://github.com/panxinmiao/myth" target="_blank" rel="noreferrer">GitHub</a>
        </footer>
    </aside>

    <!-- Native-only placeholder -->
    <div class="native-overlay hidden" id="native-overlay">
        <div class="native-card">
            <div class="native-badge">NATIVE ONLY</div>
            <h2 id="native-title">—</h2>
            <p id="native-copy">This example is only available natively and cannot be run in a web environment.</p>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
