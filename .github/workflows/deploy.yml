name: Deploy Site

on:
  # push:
  #   branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# The site is served from https://panxinmiao.github.io/myth/
env:
  DOCS_BASE: /myth/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── VitePress site (root) ────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Build VitePress site
        run: npm run docs:build

      # ── Gallery sub-app (dist/gallery) ───────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        uses: jetli/wasm-bindgen-action@v0.2.0
        with:
          version: 0.2.121

      - name: Install LLVM Toolchain
        run: sudo apt-get update && sudo apt-get install -y llvm clang

      # - name: Install latest wasm-opt
      #   run: npm install -g wasm-opt

      - name: Build Gallery & Demo Apps
        run: cargo xtask build-gallery --release

      # ── Publish combined dist/ ───────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4